     structural (nth-child) selectors off the stable #root id rather than

  /* This build sizes its game-board row via a "1fr" grid track, but
     percentage/flex-basis heights on that row's child never resolve to a
     definite size (a longstanding CSS Grid quirk), so the green felt
     background collapses to its content's natural height instead of
     filling the window. Flexbox does not have this problem. */
  #root > div {
    display: flex !important;
    flex-direction: column !important;
  }
  #root > div > div:nth-child(1),
  #root > div > div:nth-child(2) {
    display: none !important;
  }
  #root > div > div:nth-child(3) {
    flex: 1 1 auto !important;
    min-height: 0 !important;
  }
