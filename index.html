<!DOCTYPE html>
<html>
<title>Connor Dalley's Portfolio</title>
<link rel="stylesheet" href="app.css"/>
<meta charset="UTF-8">
  <body>
    <main>
        <div class="main_section">
            <div class="icons">
              <button class="about_me">
                <img src="/Res/Tour XP.png" alt="about_me">
                <p>About Me</p>
              </button>
              <button class="my_resume">
                <img src="/Res/adobe-pdf-icon-logo-vector-01.png" alt="my_resume">
                <p>Resume</p>
              </button>
              <button class="projects">
                <img src="/Res/Appearance.png" alt="my projects">
                <p>Projects</p>
              </button>
              <button class="contact_info">
                <img src="/Res/OE Send.png" alt="contact info">
                <p>Contact Info</p>
              </button>
            </div>
            <xp-window id="aboutMeWindow" title="About Me" app-type="about-me" icon="Res/Tour XP.png">
              <div class="am-content">
                <div class="am-file-view">
                  <div class="am-view-file-btns">
                    <button class="am-file">File</button>
                    <button class="am-view">View</button>
                    <button class="am-help">Help</button>
                  </div>
                  <img src="/Res/logo_grn.svg" alt="logo">
                </div>
                <div class="am-nav">
                  <div class="am-back-forward-btns">
                    <button class="am-back-btn">
                      <img src="Res/Back.png">
                      <p>Back</p>
                    </button>
                    <button class="am-forward-btn">
                      <img src="Res/Forward.png">
                      <p>Forward</p>
                    </button>
                  </div>
                  <div class="am-outside-links">
                    <button class="am-projects-btn">
                      <img src="Res/Appearance.png">
                      <p>Projects</p>
                    </button>
                    <button class="am-resume-btn">
                      <img src="Res/adobe-pdf-icon-logo-vector-01.png">
                      <p>Resume</p>
                    </button>
                  </div>
                  <div class="am-opaque-img">
                    <img src="Res/Run.png">
                  </div>

                </div>
              </div>

              </div>
            </xp-window>
            <xp-window id="resumeWindow" title="Resume" app-type="resume" icon="/Res/adobe-pdf-icon-logo-vector-01.png">

            </xp-window>
            <xp-window id="projectsWindow" title="Projects" app-type="projects" icon="/Res/Appearance.png">

            </xp-window>
            <xp-window id="contactInfoWindow" title="Contact Info" app-type="contact-info" icon="/Res/OE Send.png"></xp-window>
            <xp-window id="confirmWindow" title="Open External Link" icon="/Res/Information.png" hide-controls>
              <div class="confirm-dialog">
                <p id="confirmMessage">Are you sure you want to leave this site?</p>
                <div class="confirm-buttons">
                  <button id="confirmYes">Yes</button>
                  <button id="confirmNo">No</button>
                </div>
              </div>
            </xp-window>
        </div>
        <div class = "start_bar">
          <button class="start_button">
            <img src="/Res/code-tech-dev-svgrepo-com(1).svg" alt="start logo">
            <p>start</p>
          </button>
          <start-menu></start-menu>
          <div class="start_apps"></div>
          <div class="system_tray">
            <button class="tray_info">
              <img src="/Res/Information.png" alt="info button">
            </button>
            <button class="toggle_crt">
              <img src="/Res/Security - Ok.png" alt="toggle crt">
            </button>
            <button class="toggle_fullscreen">
              <img src="/Res/IE Enlarge Image.png">
            </button>
            <p class="active_time">10:32 AM</p>
          </div>
        </div>
    </main>
    <script src="app.js"></script>
    <script type="module" src="xp-window.js"></script>
  </body>
</html>
