<!doctype html>
<html>
  <head>
    <title>Connor Dalley's Portfolio</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="icon" type="image/png" href="/Res/Portfolio_Icon.png" />
    <link rel="preload" as="image" href="/Res/background.jpg" />
    <meta charset="UTF-8" />
  </head>
  <body>
    <div class="boot_screen" id="bootScreen">
      <video src="/Res/boot-animation-3.mp4" class="boot_gif" autoplay muted playsinline></video>
    </div>

    <div class="select_screen" id="selectScreen">
      <div class="select_top_bar"></div>
      <div class="select_body">
        <div class="select_left">
          <img src="/Res/boot-up-logo-crop.png" alt="Connor Dalley XP - Software Engineer" class="select_brand_mark" />
          <p class="select_instructions">To begin, click on Connor Dalley to log in</p>
        </div>
        <div class="select_divider"></div>
        <div class="select_right">
          <button class="select_profile_btn" id="selectProfileBtn">
            <img src="/Res/Chess_Pieces.png" alt="Connor Dalley" class="select_profile_pic" />
            <span class="select_profile_info">
              <span class="select_profile_name">Connor Dalley</span>
              <span class="select_profile_role">Software Engineer</span>
            </span>
          </button>
        </div>
      </div>
      <div class="select_bottom_bar"></div>
    </div>

    <div class="welcome_screen" id="welcomeScreen">
      <div class="welcome_top_bar"></div>
      <div class="welcome_body">
        <p class="welcome_text">welcome</p>
      </div>
      <div class="welcome_bottom_bar"></div>
    </div>

    <main>
      <div class="main_section is-loading">
        <div class="icons">
          <button class="about_me">
            <img src="/Res/Tour XP.png" alt="about me" />
            <p>About Me</p>
          </button>
          <button class="my_resume">
            <img src="/Res/adobe-pdf-icon-logo-vector-01.png" alt="resume" />
            <p>Resume</p>
          </button>
          <button class="projects">
            <img src="/Res/Appearance.png" alt="projects" />
            <p>Projects</p>
          </button>
          <button class="contact_me">
            <img src="/Res/Outlook Express.png" alt="contact me" />
            <p>Contact Me</p>
          </button>
        </div>

        <!-- App Windows -->
        <xp-window
          id="aboutMeWindow"
          title="About Me"
          app-type="about-me"
          icon="Res/Tour XP.png"
        >
        </xp-window>

        <xp-window
          id="resumeWindow"
          title="Resume"
          app-type="resume"
          icon="/Res/adobe-pdf-icon-logo-vector-01.png"
        >
        </xp-window>
        <xp-window
          id="projectsWindow"
          title="Projects"
          app-type="projects"
          icon="/Res/Appearance.png"
        >
        </xp-window>
        <xp-window
          id="contactMeWindow"
          title="Contact Me"
          app-type="contact-me"
          icon="/Res/Outlook Express.png"
          style="width: 36rem; height: 28rem"
        >
        </xp-window>

        <xp-window
          id="mediaPlayerWindow"
          title="Windows Media Player"
          app-type="media-player"
          icon="/Res/dwsd58yvs5pe1.png"
          style="width: 29rem; height: 28rem"
          chromeless
        >
        </xp-window>

        <xp-window
          id="commandPromptWindow"
          title="Command Prompt"
          app-type="command-prompt"
          icon="/Res/Command Prompt.png"
          style="width: 34rem; height: 22rem"
        >
        </xp-window>

        <xp-window
          id="imageViewerWindow"
          title="Image Viewer"
          app-type="image-viewer"
          icon="/Res/Windows Picture and Fax Viewer.png"
          style="width: 35rem; height: 28rem"
        >
        </xp-window>

        <xp-window
          id="paintWindow"
          title="Paint"
          app-type="paint"
          icon="/Res/Paint.png"
          style="width: 39rem; height: 30rem"
        >
        </xp-window>

        <xp-window
          id="notepadWindow"
          title="Notepad"
          app-type="notepad"
          icon="/Res/Notepad.png"
          style="width: 34rem; height: 26rem"
        >
        </xp-window>

        <xp-window
          id="minesweeperWindow"
          title="Minesweeper"
          app-type="minesweeper"
          icon="/Res/Minesweeper.png"
          style="width: 28rem; height: 39rem"
          disable-maximize
        >
        </xp-window>

        <xp-window
          id="solitaireWindow"
          title="Spider Solitaire"
          app-type="solitaire"
          icon="/Res/Spider Solitaire.png"
          style="width: 32rem; height: 27rem"
        >
        </xp-window>

        <xp-window
          id="confirmWindow"
          title="Open External Link"
          icon="/Res/Information.png"
          hide-controls
        >
        </xp-window>
      </div>

      <div class="start_bar">
        <button class="start_button">
          <img src="/Res/Portfolio_Icon_start.png" alt="start logo" />
          <p>start</p>
        </button>
        <start-menu></start-menu>
        <div class="start_apps"></div>
        <div class="system_tray">
          <button class="tray_info">
            <img src="/Res/Information.png" alt="info" />
          </button>
          <button class="toggle_crt">
            <img src="/Res/Security - Ok.png" alt="toggle crt" />
          </button>
          <button class="toggle_fullscreen">
            <img src="/Res/IE Enlarge Image.png" alt="fullscreen" />
          </button>
          <p class="active_time">10:32 AM</p>
        </div>
      </div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
