<style>
  .mp-player {
    display: flex;
    flex-direction: column;
  }
  .mp-top {
    display: flex;
    align-items: flex-start;
    width: 387px;
    z-index: 3;
  }
  .mp-top-left {
    display: block;
    width: 335.4px;
    height: auto;
  }
  .mp-top > div {
    position: relative;
    top: 0;
    left: 0;
    flex: 1;
  }
  .mp-top-right {
    display: block;
    position: relative;
    top: 0;
    left: 0;
    width: 100%;
    height: auto;
  }
  .mp-top-min-close-btns {
    position: absolute;
    display: flex;
    top: 8.97px;
    left: 12px;
    z-index: 3;
  }
  .mp-top-min-close-btns img {
    width: 16.83px;
    height: 16.83px;
    cursor: pointer;
  }
  .mp-min-btn:hover,
  .mp-close-btn:hover {
    outline: 1px solid grey;
    background: #999999;
  }
  .mp-bottom {
    position: relative;
    top: 0;
    left: 0;
  }
  .mp-bot-back {
    position: relative;
    top: 0;
    left: 0;
    width: 387px;
  }
  .mp-bot-back img {
    display: block;
    width: 100%;
  }
  .mp-bot-btns {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
  }
  .mp-middle {
    display: flex;
    position: relative;
    top: 0;
    left: 0;
    height: 350px;
    width: 387px;
  }
  .mp-left-border0 {
    position: relative;
    top: 0;
    left: 0;
    width: 0.81rem;
    background: #abc0e4;
    background: linear-gradient(
      90deg,
      rgba(171, 192, 228, 1) 5%,
      rgba(117, 137, 197, 1) 78%,
      rgba(76, 92, 163, 1) 100%
    );
  }
  .mp-left-border1 {
    width: 0.35rem;
    z-index: 3;
    position: relative;
    top: 0;
    left: 0;
    background: #cedff2;
    background: linear-gradient(
      90deg,
      rgba(206, 223, 242, 1) 0%,
      rgba(168, 188, 217, 1) 91%,
      rgba(70, 72, 102, 1) 100%
    );
    border-right: 0.05rem solid #080963;
  }
  .mp-right-border {
    width: 0.4rem;
    position: relative;
    z-index: 3;
    top: 0;
    left: 0;
    margin-left: auto;
    background: #cedff2;
    background: linear-gradient(
      90deg,
      rgba(206, 223, 242, 1) 0%,
      rgba(168, 188, 217, 1) 91%,
      rgba(70, 72, 102, 1) 100%
    );
    border-left: 0.05rem solid #080963;
    border-right: 0.1rem solid rgba(8, 9, 99, 0.25);
  }
  .music-cover-art {
    position: absolute;
    top: -10px;
    left: 20px;
    width: 360px;
    height: 360px;
    z-index: 2;
  }
  .mp-track-info {
    display: flex;
    color: lime;
    padding-left: 1.5rem;
    padding-top: 0.05rem;
    font-size: 0.72rem;
    width: 21rem;
    overflow: hidden;
  }
  .track-title {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-marquee-viewport {
    display: none;
    overflow: hidden;
    flex: 1;
    min-width: 0;
  }
  .track-marquee {
    display: inline-flex;
    white-space: nowrap;
  }
  .mp-track-info.is-playing .track-title {
    display: none;
  }
  .mp-track-info.is-playing .track-marquee-viewport {
    display: block;
  }
  .mp-track-info.is-playing .track-marquee {
    animation: track-marquee 12s linear infinite;
  }
  .track-marquee-text {
    padding-right: 3rem;
  }
  @keyframes track-marquee {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-50%);
    }
  }
  .mp-track-bar {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 1.2rem;
    padding-top: 0.25rem;
  }
  .mp-track-bar img {
    height: 0.75rem;
    width: auto;
  }
  .track-bar-slider {
    position: relative;
  }
  .seek-fill {
    position: absolute;
    top: 50%;
    height: 0.5rem;
    width: 0;
    transform: translateY(-50%);
    background: #5dab46;
    border-radius: 999px;
    pointer-events: none;
  }
  .seek-btn-right {
    padding-left: 14.4rem;
  }
  .audio-controls {
    display: flex;
    padding-left: 1.3rem;
    padding-top: 0.4rem;
  }
  .play-pause-btn {
    height: 2rem;
    width: auto;
  }
  .last-track-btn {
    height: 1.7rem;
    width: auto;
    padding-left: 1.75rem;
    padding-top: 0.245rem;
  }
  .next-track-btn {
    height: 1.7rem;
    width: auto;
    padding-top: 0.24rem;
    padding-left: 0.1rem;
  }
  .mute-btn {
    height: 1.7rem;
    width: auto;
    padding-left: 0.35rem;
    padding-top: 0.25rem;
  }
  .volume-control {
    position: relative;
    display: flex;
    align-items: center;
    padding-top: 0.35rem;
    padding-left: 0.4rem;
    cursor: pointer;
  }
  .volume-bar {
    display: block;
    height: 1.4rem;
    width: auto;
    padding-bottom: 0.3rem;
  }
  .volume-slider {
    position: absolute;
    top: 50%;
    height: 1.2rem;
    width: auto;
    transform: translateY(-50%);
  }
</style>
<div class="mp-player">
  <div class="mp-top" data-window-drag>
    <img class="mp-top-left" src="Res/9SeriesDefault/player_top_left.png" />
    <div>
      <img class="mp-top-right" src="Res/9SeriesDefault/player_top_right.png" />
      <div class="mp-top-min-close-btns">
        <img class="mp-min-btn" src="Res/9SeriesDefault/min-btn.png" />
        <img
          class="mp-close-btn"
          src="Res/9SeriesDefault/playlist_closebutton.png"
        />
      </div>
    </div>
  </div>
  <div class="mp-middle">
    <div class="mp-left-border0"></div>
    <div class="mp-left-border1"></div>
    <img
      class="music-cover-art"
      src="Res/music/Classicals.de - Cosi Fan Tutte, Come Scoglio - Mozart, Wolfgang Amadeus (MIT Symphony Orchestra)/Così fan tutte_cover_art.png"
    />
    <div class="mp-right-border"></div>
  </div>
  <div class="mp-bottom">
    <div class="mp-bot-back">
      <img src="Res/9SeriesDefault/minimize_transports.png" />
    </div>
    <div class="mp-bot-btns">
      <p class="mp-track-info">
        <span class="track-title"></span>
        <span class="track-marquee-viewport">
          <span class="track-marquee">
            <span class="track-marquee-text"></span>
            <span class="track-marquee-text" aria-hidden="true"></span>
          </span>
        </span>
      </p>
      <div class="mp-track-bar">
        <img
          class="seek-btn-left"
          src="Res/9SeriesDefault/seekbutton_left.png"
          alt="seek button"
        />
        <div class="seek-fill"></div>
        <img
          class="track-bar-slider"
          src="Res/9SeriesDefault/track_bar_slider.png"
        />
        <img
          class="seek-btn-right"
          src="Res/9SeriesDefault/seekbutton_right.png"
        />
      </div>
      <div class="audio-controls">
        <img class="play-pause-btn" src="Res/9SeriesDefault/mp-play.png" />
        <img
          class="last-track-btn"
          src="Res/9SeriesDefault/equalizer_preset_button_left.png"
        />
        <img
          class="next-track-btn"
          src="Res/9SeriesDefault/equalizer_preset_button_right.png"
        />
        <img class="mute-btn" src="Res/9SeriesDefault/mp-mute.png" />
        <div class="volume-control">
          <img
            class="volume-bar"
            src="Res/9SeriesDefault/volume_bar_filled.png"
          />
          <img
            class="volume-slider"
            src="Res/9SeriesDefault/volume_slider.png"
          />
        </div>
      </div>
    </div>
  </div>
  <audio class="mp-audio" preload="metadata"></audio>
</div>
